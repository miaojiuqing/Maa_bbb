  install:
    needs:
      - meta
#      - download-python-embed
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [win, macos, linux]
        arch: [aarch64, x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # install.py 从 deps / MFWCFA / 根目录查找 MaaFramework（bin + share/MaaAgentBinary）；MFWCFA 包体不含该布局，需单独拉取运行时。
      - name: Download MaaFramework
        id: download_maafw
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          tag: ${{ env.MAAFRAMEWORK_VERSION }}
          latest: ${{ env.MAAFRAMEWORK_VERSION == '' }}
          out-file-path: "deps"
          extract: true

      - name: Clean up MaaFramework archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_maafw.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MaaFramework."

      - name: Normalize MaaFramework layout under deps
        shell: bash
        run: |
          if [[ -d deps/bin && -d deps/share/MaaAgentBinary ]]; then
            echo "MaaFramework already at deps root."
            exit 0
          fi
          for d in deps/*/; do
            [[ -d "${d}bin" && -d "${d}share/MaaAgentBinary" ]] || continue
            echo "Lifting MaaFramework from $d to deps/"
            mv "${d}bin" deps/
            mv "${d}share" deps/
            rm -rf "$d"
            exit 0
          done
          echo "❌ Could not find bin + share/MaaAgentBinary under deps/"
          find deps -maxdepth 4 -type d 2>/dev/null || true
          exit 1

      - name: Download MFWCFA
        id: download_mfwcfa
        uses: robinraju/release-downloader@v1
        with:
          repository: overflow65537/MFW-PyQt6
          fileName: "MFW*-${{ matrix.os }}-${{ matrix.arch }}*"
          tag: ${{ env.MFWCFA_VERSION }}
          latest: ${{ env.MFWCFA_VERSION == '' }}
          out-file-path: "MFWCFA"
          extract: true

      - name: Clean up MFWCFA archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfwcfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MFWCFA."

      - name: Apply custom icon to MFW.exe on Windows
        if: matrix.os == 'win'
        shell: bash
        run: |
          ICON_PATH="./assets/resource/base/image/logo.ico"
          if [ ! -f "$ICON_PATH" ]; then
            echo "❌ ERROR: Icon file not found at $ICON_PATH"
            exit 1
          fi

          MFW_EXE="$(find MFWCFA -maxdepth 2 -type f -name 'MFW.exe' | head -n 1)"
          if [ -z "$MFW_EXE" ]; then
            echo "❌ ERROR: MFW.exe not found under MFWCFA"
            exit 1
          fi

          echo "✅ Applying icon from $ICON_PATH to $MFW_EXE..."

          # Download rcedit.exe (Windows x64 tool; run under Wine on Linux CI)
          curl -fsSL https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe -o rcedit.exe

          # Headless Ubuntu has no X11; Wine still needs a virtual framebuffer for rcedit.
          # Use wine64 + win64 prefix to avoid WoW64/rundll32 issues with rcedit-x64.exe.
          echo "📦 Installing wine64 and xvfb..."
          sudo apt-get update
          sudo apt-get install -y wine64 xvfb

          export WINEPREFIX="${RUNNER_TEMP}/wine-rcedit"
          export WINEARCH=win64
          export WINEDLLOVERRIDES="mscoree,mshtml="
          export WINEDEBUG=-all
          rm -rf "$WINEPREFIX"

          chmod +x rcedit.exe

          echo "🍷 Initializing Wine prefix (64-bit) under Xvfb..."
          xvfb-run -a wine64 wineboot --init
          sleep 3

          echo "🍷 Running rcedit under Xvfb..."
          xvfb-run -a wine64 ./rcedit.exe "$MFW_EXE" --set-icon "$ICON_PATH"

          echo "✅ Icon successfully applied."

      - name: Install
        shell: bash
        run: |
          python -m pip install json-with-comments
          python ./tools/install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}

          if [ -d "MFWCFA" ]; then
            echo "Copying MFWCFA files to install directory..."
            mkdir -p install
            rsync -av --ignore-existing MFWCFA/ install/
          else
            echo "MFWCFA directory not found, skipping copy."
          fi

#      - uses: actions/download-artifact@v4
#        with:
#          name: python-embed-${{ matrix.os }}-${{ matrix.arch }}
#          path: ./install/python

      - uses: actions/upload-artifact@v4
        with:
          name: Maa_bbb-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs:
      - meta
      - install
      - changelog
#      - download-python-embed
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            if [[ "$f" == *"python-embed"* ]]; then
              echo "Skipping $f (python-embed)."
              continue
            fi
            (cd $f && zip -r ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

      - name: Trigger MirrorChyanUploading
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
