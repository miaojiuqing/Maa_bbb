  install:
    needs:
      - meta
#      - download-python-embed
    strategy:
      matrix:
        include:
          - os: win
            arch: x86_64
            runs-on: windows-latest
          - os: win
            arch: aarch64
            runs-on: windows-11-arm
          - os: macos
            arch: x86_64
            runs-on: macos-15-intel
          - os: macos
            arch: aarch64
            runs-on: macos-latest
          - os: linux
            arch: x86_64
            runs-on: ubuntu-latest
          - os: linux
            arch: aarch64
            runs-on: ubuntu-24.04-arm
      fail-fast: false
    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # install.py 从 deps / MFWCFA / 根目录查找 MaaFramework（bin + share/MaaAgentBinary）；MFWCFA 包体不含该布局，需单独拉取运行时。
      - name: Download MaaFramework
        id: download_maafw
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          tag: ${{ env.MAAFRAMEWORK_VERSION }}
          latest: ${{ env.MAAFRAMEWORK_VERSION == '' }}
          out-file-path: "deps"
          extract: true

      - name: Clean up MaaFramework archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_maafw.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MaaFramework."

      - name: Normalize MaaFramework layout under deps
        shell: bash
        run: |
          if [[ -d deps/bin && -d deps/share/MaaAgentBinary ]]; then
            echo "MaaFramework already at deps root."
            exit 0
          fi
          for d in deps/*/; do
            [[ -d "${d}bin" && -d "${d}share/MaaAgentBinary" ]] || continue
            echo "Lifting MaaFramework from $d to deps/"
            mv "${d}bin" deps/
            mv "${d}share" deps/
            rm -rf "$d"
            exit 0
          done
          echo "❌ Could not find bin + share/MaaAgentBinary under deps/"
          find deps -maxdepth 4 -type d 2>/dev/null || true
          exit 1

      - name: Download MFWCFA
        id: download_mfwcfa
        uses: robinraju/release-downloader@v1
        with:
          repository: overflow65537/MFW-PyQt6
          fileName: "MFW*-${{ matrix.os }}-${{ matrix.arch }}*"
          tag: ${{ env.MFWCFA_VERSION }}
          latest: ${{ env.MFWCFA_VERSION == '' }}
          out-file-path: "MFWCFA"
          extract: true

      - name: Clean up MFWCFA archive
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfwcfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MFWCFA."

      - name: Convert PNG to ICO
        if: matrix.os == 'win' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          set -euo pipefail
          PNG_PATH="./logo.png"
          if [ ! -f "$PNG_PATH" ]; then
            echo "❌ ERROR: $PNG_PATH not found"
            exit 1
          fi
          choco install imagemagick -y
          export PATH="$PATH:/c/ProgramData/chocolatey/bin"
          for d in "/c/Program Files/ImageMagick-"*; do
            if [ -x "$d/magick.exe" ]; then
              export PATH="$d:$PATH"
              break
            fi
          done
          if ! command -v magick >/dev/null 2>&1; then
            echo "❌ ERROR: magick not on PATH after ImageMagick install"
            exit 1
          fi
          magick convert "$PNG_PATH" -define icon:auto-resize=256,128,64,48,32,24,16 ./m9a.ico
          echo "✅ ICO written to ./m9a.ico"

      - name: Modify Windows exe icons
        if: matrix.os == 'win' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "./m9a.ico" ]; then
            echo "❌ ERROR: ./m9a.ico missing (run Convert PNG to ICO first)"
            exit 1
          fi
          curl -fsSL https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe -o rcedit.exe

          ICO_W="$(cygpath -w "$(pwd)/m9a.ico")"

          MFW_EXE="$(find MFWCFA -maxdepth 4 -type f -name 'MFW.exe' 2>/dev/null | head -n 1)"
          if [ -n "$MFW_EXE" ]; then
            _mfw_abs="$(cd "$(dirname "$MFW_EXE")" && pwd)/$(basename "$MFW_EXE")"
            ./rcedit.exe "$(cygpath -w "$_mfw_abs")" --set-icon "$ICO_W"
            echo "MFW.exe icon updated: $MFW_EXE"
          else
            echo "MFW.exe not found under MFWCFA, skipping icon update."
          fi

      - name: Install
        shell: bash
        run: |
          python -m pip install json-with-comments
          python ./tools/install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}

          if [ -d "MFWCFA" ]; then
            echo "Copying MFWCFA files to install directory..."
            mkdir -p install
            python <<'PY'
          import shutil
          from pathlib import Path

          src, dst = Path("MFWCFA"), Path("install")
          if not src.is_dir():
              raise SystemExit(0)
          dst.mkdir(parents=True, exist_ok=True)
          for p in src.rglob("*"):
              if not p.is_file():
                  continue
              rel = p.relative_to(src)
              t = dst / rel
              if t.exists():
                  continue
              t.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(p, t)
          PY
          else
            echo "MFWCFA directory not found, skipping copy."
          fi

#      - uses: actions/download-artifact@v4
#        with:
#          name: python-embed-${{ matrix.os }}-${{ matrix.arch }}
#          path: ./install/python

      - uses: actions/upload-artifact@v4
        with:
          name: Maa_bbb-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs:
      - meta
      - install
      - changelog
#      - download-python-embed
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            if [[ "$f" == *"python-embed"* ]]; then
              echo "Skipping $f (python-embed)."
              continue
            fi
            (cd $f && zip -r ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

      - name: Trigger MirrorChyanUploading
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
